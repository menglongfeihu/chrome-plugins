<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 蓝色圆底 -->
  <circle cx="64" cy="64" r="60" fill="#2f7fe0"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#1f66c0" stroke-width="2"/>

  <!-- 外圈彩色撤销箭头（逆时针，绿-青-橙三段渐变环 + 箭头） -->
  <g fill="none" stroke-width="9" stroke-linecap="round">
    <!-- 环：从顶部缺口起，逆时针约 300° -->
    <path d="M64 20
             A44 44 0 1 0 99 42"
          stroke="url(#ring)"/>
  </g>
  <!-- 箭头头部（指向左上，表示逆时针撤销） -->
  <path d="M64 8 L64 32 L48 20 Z" fill="#22b14c"/>

  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22b14c"/>
      <stop offset="45%" stop-color="#12a0c8"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- 时钟表盘 -->
  <circle cx="64" cy="66" r="30" fill="#ffffff"/>
  <circle cx="64" cy="66" r="30" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- 指针 -->
  <g stroke="#2f7fe0" stroke-linecap="round">
    <line x1="64" y1="66" x2="64" y2="47" stroke-width="6"/>
    <line x1="64" y1="66" x2="78" y2="72" stroke-width="6"/>
  </g>
  <circle cx="64" cy="66" r="4" fill="#1f66c0"/>
</svg>
