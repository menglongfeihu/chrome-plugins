<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>快恢复</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="brand-icon" src="icons/icon32.png" alt="">
      <span class="title">快恢复</span>
      <button class="sel-btn" id="selectAll">全选</button>
      <button class="sel-btn" id="invertSelect">反选</button>
      <button class="clear-all" id="clearAll">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <path d="M6 2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2 4.5h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M3.5 4.5l.75 9.5a.5.5 0 00.5.5h6.5a.5.5 0 00.5-.5l.75-9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 7v5M9.5 7v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        清空
      </button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="搜索…">
      <button class="search-clear" id="searchClear" style="display:none">×</button>
    </div>
    <div class="tab-list" id="tabList"></div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="pg-btn" id="pgFirst" title="第一页">«</button>
      <button class="pg-btn" id="pgPrev" title="上一页">‹</button>
      <span class="pg-info" id="pgInfo"></span>
      <button class="pg-btn" id="pgNext" title="下一页">›</button>
      <button class="pg-btn" id="pgLast" title="最后一页">»</button>
      <input class="pg-goto-input" type="number" id="pgGoto" min="1" placeholder="页">
      <button class="pg-btn" id="pgGotoBtn">跳</button>
    </div>
    <div class="empty" id="emptyState">没有最近关闭的标签页</div>
    <div class="footer">
      <button class="settings-link" id="settingsBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        设置
      </button>
      <button class="open-selected" id="openSelected" style="display:none">打开选中</button>
      <span class="tab-count" id="tabCount"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
